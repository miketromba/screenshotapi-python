name: Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Type "publish" to upload the built artifacts to PyPI.
        required: true
        default: dry-run

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version is tagged (when publishing)
        if: github.event.inputs.publish == 'publish'
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if ! git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "::error::No git tag v${version} found. Tag the release commit (git tag v${version} && git push origin v${version}) before publishing."
            exit 1
          fi
          echo "Publishing version ${version} (tag v${version} present)."

      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: screenshotapi-python-dist
          path: dist/*

  publish:
    needs: build
    if: github.event.inputs.publish == 'publish'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/screenshotapi-to
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: screenshotapi-python-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
